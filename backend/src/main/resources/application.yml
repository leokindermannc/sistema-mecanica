spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/garagepro?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USER:garagepro}
    password: ${DB_PASS:garagepro}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

logging:
  level:
    com.garagepro: INFO
    org.flywaydb: INFO

jwt:
  secret: ${JWT_SECRET:garagepro-secret-key-muito-segura-minimo-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
